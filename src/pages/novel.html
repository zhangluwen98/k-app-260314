<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kira - 小说详情</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#ec4899',
                        dark: '#1e293b',
                        light: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .character-card {
            transition: all 0.3s ease;
        }
        
        .character-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm sticky top-0 z-10">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button id="back-btn" class="text-gray-600 hover:text-primary transition-colors">
                    <i data-lucide="arrow-left"></i>
                </button>
                <h1 class="text-2xl font-bold text-dark">Kira</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="profile-btn" class="text-gray-600 hover:text-primary transition-colors">
                    <i data-lucide="user"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-6">
        <div id="novel-detail" class="space-y-8">
            <!-- 小说信息将通过 JavaScript 动态生成 -->
        </div>
    </main>

    <!-- 脚本 -->
    <script>
        // 初始化 Lucide 图标
        lucide.createIcons();

        // 获取小说 ID
        function getNovelId() {
            const path = window.location.pathname;
            const parts = path.split('/');
            return parts[parts.length - 1];
        }

        // 加载小说详情
        async function loadNovelDetail() {
            try {
                const novelId = getNovelId();
                const response = await fetch(`/novels/${novelId}.json`);
                const novel = await response.json();
                const novelDetail = document.getElementById('novel-detail');
                
                novelDetail.innerHTML = `
                    <!-- 封面和基本信息 -->
                    <div class="bg-white rounded-lg shadow-md overflow-hidden">
                        <div class="md:flex">
                            <div class="md:w-1/3">
                                <img src="/assets/images/covers/${novel.cover}" alt="${novel.title}" class="w-full h-full object-cover">
                            </div>
                            <div class="p-6 md:w-2/3">
                                <h2 class="text-2xl font-bold mb-2">${novel.title}</h2>
                                <p class="text-gray-600 mb-4">作者：${novel.author}</p>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${novel.tags.map(tag => `<span class="px-2 py-1 bg-gray-100 text-xs rounded-full">${tag}</span>`).join('')}
                                </div>
                                <p class="text-gray-700 mb-6">${novel.description}</p>
                                <div class="flex space-x-4">
                                    <button id="start-reading-btn" class="px-6 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors font-medium">
                                        开始阅读
                                    </button>
                                    <button id="favorite-btn" class="px-6 py-2 border border-primary text-primary rounded-md hover:bg-primary/10 transition-colors font-medium">
                                        <i data-lucide="heart"></i>
                                        <span class="ml-1">收藏</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 角色列表 -->
                    <div class="bg-white rounded-lg shadow-md p-6">
                        <h3 class="text-lg font-bold mb-4">角色列表</h3>
                        <div class="flex space-x-4 overflow-x-auto pb-4">
                            ${novel.characters.map(character => `
                                <div class="character-card flex-shrink-0 w-24">
                                    <div class="w-20 h-20 rounded-full overflow-hidden mx-auto mb-2">
                                        <img src="/assets/images/avatars/${character.avatar}" alt="${character.name}" class="w-full h-full object-cover">
                                    </div>
                                    <p class="text-center text-sm font-medium">${character.name}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <!-- 评论区 -->
                    <div class="bg-white rounded-lg shadow-md p-6">
                        <h3 class="text-lg font-bold mb-4">评论区</h3>
                        <div class="space-y-4">
                            <div class="flex space-x-3">
                                <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
                                <div class="flex-1">
                                    <textarea class="w-full border border-gray-300 rounded-md p-3 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" rows="3" placeholder="写下你的评论..."></textarea>
                                    <div class="mt-2 flex justify-end">
                                        <button class="px-4 py-1 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors text-sm">
                                            发布
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 评论示例 -->
                            <div class="flex space-x-3">
                                <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
                                <div class="flex-1">
                                    <div class="bg-gray-100 rounded-md p-3">
                                        <p class="font-medium text-sm mb-1">用户1</p>
                                        <p class="text-sm text-gray-700">故事很精彩，期待后续发展！</p>
                                    </div>
                                    <p class="text-xs text-gray-500 mt-1">2024-01-01 12:00</p>
                                </div>
                            </div>
                            
                            <div class="flex space-x-3">
                                <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
                                <div class="flex-1">
                                    <div class="bg-gray-100 rounded-md p-3">
                                        <p class="font-medium text-sm mb-1">用户2</p>
                                        <p class="text-sm text-gray-700">角色设定很有趣，剧情发展也很吸引人。</p>
                                    </div>
                                    <p class="text-xs text-gray-500 mt-1">2024-01-02 14:30</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                // 重新初始化图标
                lucide.createIcons();
                
                // 绑定事件
                document.getElementById('start-reading-btn').addEventListener('click', () => {
                    window.location.href = `/read/${novelId}`;
                });
                
                document.getElementById('favorite-btn').addEventListener('click', function() {
                    const icon = this.querySelector('i');
                    if (icon.dataset.lucide === 'heart') {
                        icon.setAttribute('data-lucide', 'heart-fill');
                        this.classList.add('bg-primary', 'text-white');
                        this.classList.remove('border-primary', 'text-primary');
                    } else {
                        icon.setAttribute('data-lucide', 'heart');
                        this.classList.remove('bg-primary', 'text-white');
                        this.classList.add('border-primary', 'text-primary');
                    }
                    lucide.createIcons();
                });
            } catch (error) {
                console.error('加载小说详情失败:', error);
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            loadNovelDetail();
            
            // 返回按钮点击事件
            document.getElementById('back-btn').addEventListener('click', () => {
                window.history.back();
            });
            
            // 个人中心按钮点击事件
            document.getElementById('profile-btn').addEventListener('click', () => {
                window.location.href = '/profile';
            });
        });
    </script>
</body>
</html>
